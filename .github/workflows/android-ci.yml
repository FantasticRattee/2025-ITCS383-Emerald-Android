name: Android CI / SonarCloud

on:
  push:
    branches: [ "main", "master", "develop" ]
  pull_request:
    branches: [ "main", "master", "develop" ]

# Cancel in-progress runs for the same branch/PR
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test-analyze:
    name: Build · Test · Coverage · SonarCloud
    runs-on: ubuntu-latest

    steps:
      # ─── Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0          # Full history required by SonarCloud

      # ─── Java 17 ───────────────────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # ─── Gradle cache ──────────────────────────────────────────────────────
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/libs.versions.toml') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # ─── SonarCloud cache ──────────────────────────────────────────────────
      - name: Cache SonarCloud packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      # ─── Make gradlew executable ───────────────────────────────────────────
      - name: Make gradlew executable
        run: chmod +x ./gradlew

      # ─── Build (debug) ─────────────────────────────────────────────────────
      - name: Build project (debug)
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      # ─── Unit tests ────────────────────────────────────────────────────────
      - name: Run unit tests
        run: ./gradlew testDebugUnitTest --no-daemon --stacktrace

      # ─── JaCoCo coverage report ────────────────────────────────────────────
      - name: Generate JaCoCo coverage report
        run: ./gradlew jacocoTestReport --no-daemon --stacktrace

      # ─── Upload test results ───────────────────────────────────────────────
      - name: Upload unit-test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: app/build/test-results/**/*.xml
          retention-days: 14

      # ─── Upload coverage report ────────────────────────────────────────────
      - name: Upload JaCoCo HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-html-report
          path: app/build/reports/jacoco/jacocoTestReport/html/
          retention-days: 14

      - name: Upload JaCoCo XML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-xml-report
          path: app/build/reports/jacoco/jacocoTestReport/jacocoTestReport.xml
          retention-days: 14

      - name: Debug sonar config
        run: cat sonar-project.properties

      # ─── SonarCloud analysis ───────────────────────────────────────────────
      - name: SonarCloud Scan
        if: github.event_name != 'pull_request'
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN1 }}
