name: SonarCloud

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 17

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Build project
        run: ./gradlew build

      - name: Run Test
        run: ./gradlew test

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v2
        with:
          args: >
            -Dsonar.projectKey=FantasticRattee_2025-ITCS383-Arai-Kor-Dai
            -Dsonar.organization=fantasticrattee
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}