name: SonarCloud

on:
  push:
    branches:
      - main
      - "*"
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 17

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Build and Test
        run: ./gradlew test

      - name: SonarCloud Scan
        run: |
          ./gradlew sonar \
          -Dsonar.projectKey=FantasticRattee_2025-ITCS383-Arai-Kor-Dai \
          -Dsonar.organization=fantasticrattee \
          -Dsonar.host.url=https://sonarcloud.io \
          -Dsonar.login=${{ secrets.SONAR_TOKEN }}