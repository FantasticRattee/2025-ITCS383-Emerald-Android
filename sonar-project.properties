# ─────────────────────────────────────────────────────────────────
# SonarCloud project configuration
# Replace YOUR_ORG and YOUR_PROJECT_KEY with your actual values,
# or supply them via GitHub Secrets (recommended).
# ─────────────────────────────────────────────────────────────────

sonar.projectKey=peemnoin_2025-ITCS383-Emerald-Android
sonar.organization=peemnoin

sonar.projectName=PostOfficeApp Android
sonar.projectVersion=1.0

# ─── Source / test paths ──────────────────────────────────────────
sonar.sources=app/src/main
sonar.tests=app/src/test
sonar.java.binaries=app/build/tmp/kotlin-classes/debug
sonar.host.url=https://sonarcloud.io
sonar.sourceEncoding=UTF-8

# ─── Language ─────────────────────────────────────────────────────
sonar.language=kotlin

# ─── Exclusions ───────────────────────────────────────────────────
# Exclude generated code, build artefacts, and framework boilerplate
sonar.exclusions=\
  **/R.java,\
  **/R.kt,\
  **/BuildConfig.*,\
  **/*Activity.kt,\
  **/*Application.kt,\
  **/ui/theme/**,\
  **/ui/screens/**,\
  **/navigation/**,\
  **/*.xml,\
  **/build/**,\
  **/androidTest/**

# ─── Coverage ─────────────────────────────────────────────────────
sonar.coverage.jacoco.xmlReportPaths=app/build/reports/jacoco/jacocoTestReport/jacocoTestReport.xml

# ─── Quality gate (enforce 90 % coverage) ─────────────────────────
# This mirrors the Quality Gate you must configure in the SonarCloud UI:
#   Conditions → Coverage < 90 % → FAILED
# The property below is informational only; the gate is set on the server.
sonar.qualitygate.wait=true
